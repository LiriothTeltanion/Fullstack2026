name: NOVA Quality Gate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nova-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Syntax, security, docs and tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm

      - name: Install JavaScript tooling
        run: npm ci

      - name: Whole-repository quality gate
        run: python tools/nova_quality_gate.py --repo . --strict

      - name: Python anchor tests
        run: python -m unittest discover -s tests/python -p "test_*.py" -v

      - name: JavaScript and TypeScript anchor tests
        run: npm run test:js
