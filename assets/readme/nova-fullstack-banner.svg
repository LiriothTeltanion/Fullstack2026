<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="420" viewBox="0 0 1400 420" role="img" aria-labelledby="title desc">
  <title id="title">Fullstack2026 animated banner</title>
  <desc id="desc">A futuristic animated learning constellation for Kevin Cusnir's full-stack repository.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#071426"/>
      <stop offset="48%" stop-color="#10265a"/>
      <stop offset="100%" stop-color="#180d35"/>
      <animate attributeName="x1" values="0;1;0" dur="12s" repeatCount="indefinite"/>
    </linearGradient>
    <radialGradient id="glow">
      <stop offset="0%" stop-color="#72e7ff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#72e7ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#7adfff" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1400" height="420" rx="30" fill="url(#bg)"/>
  <rect width="1400" height="420" rx="30" fill="url(#grid)"/>

  <circle cx="185" cy="90" r="145" fill="url(#glow)" opacity="0.22">
    <animate attributeName="r" values="100;170;100" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1210" cy="320" r="175" fill="url(#glow)" opacity="0.18">
    <animate attributeName="r" values="180;110;180" dur="9s" repeatCount="indefinite"/>
  </circle>

  <g opacity="0.68" stroke="#71e6ff" stroke-width="2">
    <path d="M90 320 C280 190, 400 360, 585 210 S925 90, 1135 235 S1290 215, 1360 125" fill="none" stroke-dasharray="10 14">
      <animate attributeName="stroke-dashoffset" values="0;-240" dur="9s" repeatCount="indefinite"/>
    </path>
    <path d="M70 130 C250 250, 450 50, 660 170 S1010 355, 1320 180" fill="none" stroke="#a78bfa" stroke-opacity="0.55" stroke-dasharray="7 18">
      <animate attributeName="stroke-dashoffset" values="0;220" dur="11s" repeatCount="indefinite"/>
    </path>
  </g>

  <g filter="url(#softGlow)">
    <circle cx="175" cy="282" r="9" fill="#75eaff">
      <animate attributeName="r" values="7;13;7" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="463" cy="145" r="7" fill="#a78bfa">
      <animate attributeName="opacity" values="0.35;1;0.35" dur="3.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1012" cy="135" r="8" fill="#75eaff">
      <animate attributeName="r" values="5;12;5" dur="3.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1230" cy="270" r="7" fill="#f0abfc">
      <animate attributeName="opacity" values="1;0.25;1" dur="2.7s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">
    <text x="700" y="120" fill="#a8efff" font-size="24" letter-spacing="7">KEVIN CUSNIR • LIRIOTHTELTANION</text>
    <text x="700" y="218" fill="#ffffff" font-size="76" font-weight="800" letter-spacing="3">FULLSTACK2026</text>
    <text x="700" y="272" fill="#c9d8ff" font-size="25" letter-spacing="2">PYTHON → OOP → JAVASCRIPT → ASYNC → TYPESCRIPT → FULL-STACK</text>
    <text x="700" y="335" fill="#72e7ff" font-size="22" font-weight="600">
      A living learning archive evolving into a deployable product ecosystem
      <animate attributeName="opacity" values="0.5;1;0.5" dur="4s" repeatCount="indefinite"/>
    </text>
  </g>

  <rect x="20" y="20" width="1360" height="380" rx="24" fill="none" stroke="#86e9ff" stroke-opacity="0.35" stroke-width="2">
    <animate attributeName="stroke-opacity" values="0.18;0.55;0.18" dur="5s" repeatCount="indefinite"/>
  </rect>
</svg>