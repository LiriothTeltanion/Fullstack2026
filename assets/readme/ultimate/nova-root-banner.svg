<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="340" viewBox="0 0 1200 340" role="img" aria-labelledby="title desc">
<title id="title">Fullstack2026 animated portfolio banner</title>
<desc id="desc">A cosmic six-week learning path from Python to databases and Node.js.</desc>
<defs>
  <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#050816"/><stop offset=".48" stop-color="#10184a"/><stop offset="1" stop-color="#071b2e"/></linearGradient>
  <linearGradient id="tg" x1="0" x2="1"><stop stop-color="#67e8f9"/><stop offset=".42" stop-color="#c4b5fd"/><stop offset=".72" stop-color="#f9a8d4"/><stop offset="1" stop-color="#86efac"/></linearGradient>
  <filter id="glow"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <path id="comet" d="M35 72 C250 5 430 145 640 72 S1000 12 1165 92"/>
  <style>.title{font:900 62px 'Segoe UI',Arial,sans-serif;letter-spacing:5px;fill:url(#tg)}.sub{font:600 20px 'Segoe UI',Arial,sans-serif;fill:#dbeafe;letter-spacing:1.2px}.micro{font:700 11px 'Segoe UI',Arial,sans-serif;fill:#94a3b8;letter-spacing:.8px}.small{font:800 14px 'Segoe UI',Arial,sans-serif;fill:#f8fafc}.tiny{font:900 11px 'Segoe UI',Arial,sans-serif;fill:#07111f}</style>
</defs>
<rect width="1200" height="340" rx="28" fill="url(#bg)"/>
<g opacity=".5"><circle cx="65" cy="48" r="1.8" fill="#fff"><animate attributeName="opacity" values=".15;1;.15" dur="3.1s" repeatCount="indefinite"/></circle><circle cx="175" cy="116" r="1.4" fill="#67e8f9"><animate attributeName="opacity" values="1;.15;1" dur="4.3s" repeatCount="indefinite"/></circle><circle cx="335" cy="43" r="1.5" fill="#fff"><animate attributeName="opacity" values=".2;1;.2" dur="2.8s" repeatCount="indefinite"/></circle><circle cx="515" cy="105" r="2" fill="#c4b5fd"><animate attributeName="opacity" values="1;.2;1" dur="3.7s" repeatCount="indefinite"/></circle><circle cx="765" cy="45" r="1.6" fill="#fff"><animate attributeName="opacity" values=".1;1;.1" dur="3.5s" repeatCount="indefinite"/></circle><circle cx="945" cy="120" r="1.5" fill="#86efac"><animate attributeName="opacity" values="1;.1;1" dur="4.1s" repeatCount="indefinite"/></circle><circle cx="1125" cy="44" r="2" fill="#fff"><animate attributeName="opacity" values=".2;1;.2" dur="3s" repeatCount="indefinite"/></circle></g>
<use xlink:href="#comet" fill="none" stroke="#67e8f9" stroke-opacity=".18" stroke-width="2" stroke-dasharray="8 13"/>
<circle r="6" fill="#fff" filter="url(#glow)"><animateMotion dur="8s" repeatCount="indefinite"><mpath xlink:href="#comet"/></animateMotion></circle>
<text x="600" y="105" text-anchor="middle" class="title" filter="url(#glow)">FULLSTACK 2026</text>
<text x="600" y="143" text-anchor="middle" class="sub">LEARN · BUILD · TEST · DOCUMENT · AUTOMATE · SHIP</text>
<text x="600" y="180" text-anchor="middle" class="micro">A PROGRESSIVE ENGINEERING JOURNEY BY KEVIN “LIRIOTH” CUSNIR</text>
<path d="M85 223 C240 188 370 238 510 209 S770 185 1115 219" fill="none" stroke="url(#tg)" stroke-width="4" stroke-linecap="round" stroke-dasharray="12 12"><animate attributeName="stroke-dashoffset" from="0" to="-96" dur="5s" repeatCount="indefinite"/></path>
<g transform="translate(120 263)"><rect x="-72" y="-34" width="144" height="68" rx="18" fill="#0b1330" stroke="#38bdf8" stroke-width="2"><animate attributeName="opacity" values=".72;1;.72" dur="3.2s" repeatCount="indefinite"/></rect><circle cx="-49" cy="0" r="12" fill="#38bdf8"><animate attributeName="r" values="10;14;10" dur="3.2s" repeatCount="indefinite"/></circle><text x="-49" y="5" text-anchor="middle" class="tiny">1</text><text x="-25" y="-4" class="small">W1</text><text x="-25" y="17" class="micro">PYTHON</text></g>
<g transform="translate(300 263)"><rect x="-72" y="-34" width="144" height="68" rx="18" fill="#0b1330" stroke="#a78bfa" stroke-width="2"><animate attributeName="opacity" values=".72;1;.72" dur="3.2s" begin=".22s" repeatCount="indefinite"/></rect><circle cx="-49" cy="0" r="12" fill="#a78bfa"/><text x="-49" y="5" text-anchor="middle" class="tiny">2</text><text x="-25" y="-4" class="small">W2</text><text x="-25" y="17" class="micro">OOP</text></g>
<g transform="translate(480 263)"><rect x="-72" y="-34" width="144" height="68" rx="18" fill="#0b1330" stroke="#f472b6" stroke-width="2"><animate attributeName="opacity" values=".72;1;.72" dur="3.2s" begin=".44s" repeatCount="indefinite"/></rect><circle cx="-49" cy="0" r="12" fill="#f472b6"/><text x="-49" y="5" text-anchor="middle" class="tiny">3</text><text x="-25" y="-4" class="small">W3</text><text x="-25" y="17" class="micro">DOM</text></g>
<g transform="translate(660 263)"><rect x="-72" y="-34" width="144" height="68" rx="18" fill="#0b1330" stroke="#f59e0b" stroke-width="2"><animate attributeName="opacity" values=".72;1;.72" dur="3.2s" begin=".66s" repeatCount="indefinite"/></rect><circle cx="-49" cy="0" r="12" fill="#f59e0b"/><text x="-49" y="5" text-anchor="middle" class="tiny">4</text><text x="-25" y="-4" class="small">W4</text><text x="-25" y="17" class="micro">ASYNC</text></g>
<g transform="translate(840 263)"><rect x="-72" y="-34" width="144" height="68" rx="18" fill="#0b1330" stroke="#22c55e" stroke-width="2"><animate attributeName="opacity" values=".72;1;.72" dur="3.2s" begin=".88s" repeatCount="indefinite"/></rect><circle cx="-49" cy="0" r="12" fill="#22c55e"/><text x="-49" y="5" text-anchor="middle" class="tiny">5</text><text x="-25" y="-4" class="small">W5</text><text x="-25" y="17" class="micro">TYPESCRIPT</text></g>
<g transform="translate(1020 263)"><rect x="-72" y="-34" width="144" height="68" rx="18" fill="#0b1330" stroke="#06b6d4" stroke-width="2"><animate attributeName="opacity" values=".72;1;.72" dur="3.2s" begin="1.1s" repeatCount="indefinite"/></rect><circle cx="-49" cy="0" r="12" fill="#06b6d4"/><text x="-49" y="5" text-anchor="middle" class="tiny">6</text><text x="-25" y="-4" class="small">W6</text><text x="-25" y="17" class="micro">DATA + NODE</text></g>
</svg>
