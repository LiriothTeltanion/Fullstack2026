<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="260" viewBox="0 0 1200 260" role="img" aria-label="Fullstack2026 roadmap horizon">
<defs><linearGradient id="route" x1="0" x2="1"><stop stop-color="#22c55e"/><stop offset=".45" stop-color="#06b6d4"/><stop offset=".72" stop-color="#f59e0b"/><stop offset="1" stop-color="#a78bfa"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><path id="road" d="M85 142 C250 72 310 208 470 142 S690 72 850 142 S1010 205 1120 118"/><style>.h{font:900 24px 'Segoe UI',Arial,sans-serif;fill:#f8fafc}.t{font:800 14px 'Segoe UI',Arial,sans-serif;fill:#f8fafc}.s{font:600 11px 'Segoe UI',Arial,sans-serif;fill:#94a3b8}.check{font:900 21px 'Segoe UI Symbol','Segoe UI',Arial,sans-serif;fill:#07111f}</style></defs>
<rect width="1200" height="260" rx="24" fill="#070c20" stroke="#263154"/><text x="600" y="38" text-anchor="middle" class="h">NEXT HORIZON · FROM CURRICULUM TO DEPLOYED PRODUCT</text><use xlink:href="#road" fill="none" stroke="#20294a" stroke-width="14" stroke-linecap="round"/><use xlink:href="#road" fill="none" stroke="url(#route)" stroke-width="6" stroke-linecap="round" stroke-dasharray="14 12"><animate attributeName="stroke-dashoffset" from="0" to="-104" dur="5.5s" repeatCount="indefinite"/></use><circle r="9" fill="#fff" filter="url(#glow)"><animateMotion dur="8s" repeatCount="indefinite"><mpath xlink:href="#road"/></animateMotion></circle>
<g transform="translate(130 135)"><circle r="29" fill="#22c55e"/><text y="7" text-anchor="middle" class="check">✓</text><text y="55" text-anchor="middle" class="t">STABILIZE</text><text y="74" text-anchor="middle" class="s">structure · syntax · docs</text></g><g transform="translate(430 150)"><circle r="29" fill="#06b6d4"/><text y="7" text-anchor="middle" class="check">✓</text><text y="55" text-anchor="middle" class="t">AUTOMATE</text><text y="74" text-anchor="middle" class="s">tests · CI · reports</text></g><g transform="translate(790 130)"><circle r="29" fill="#f59e0b"><animate attributeName="r" values="27;34;27" dur="2.8s" repeatCount="indefinite"/></circle><text y="7" text-anchor="middle" class="check">3</text><text y="55" text-anchor="middle" class="t">POLISH</text><text y="74" text-anchor="middle" class="s">demos · accessibility · deploy</text></g><g transform="translate(1080 122)"><circle r="34" fill="#a78bfa" filter="url(#glow)"><animate attributeName="fill" values="#a78bfa;#f472b6;#67e8f9;#a78bfa" dur="5s" repeatCount="indefinite"/></circle><text y="7" text-anchor="middle" class="check">4</text><text y="62" text-anchor="middle" class="t">NOVA DASHBOARD</text><text y="81" text-anchor="middle" class="s">full-stack capstone</text></g>
</svg>
